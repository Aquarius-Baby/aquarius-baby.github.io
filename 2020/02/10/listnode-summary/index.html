        <p>链表题解整理：</p>
<ul>
<li>找到中间节点</li>
<li>删除倒数第k个链表</li>
<li>反转链表</li>
<li>合并2个链表</li>
</ul>
<a id="more"></a>


<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> </span>&#123;</span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">reorderList</span><span class="params">(ListNode head)</span> </span>&#123;</span><br><span class="line">        <span class="keyword">if</span>(head == <span class="keyword">null</span>) <span class="keyword">return</span>;</span><br><span class="line">        <span class="comment">// 1.找到中间节点</span></span><br><span class="line">        ListNode slow = head;</span><br><span class="line">        ListNode fast = head;</span><br><span class="line">        <span class="keyword">while</span>(fast != <span class="keyword">null</span>  &amp;&amp; fast.next !=<span class="keyword">null</span>)&#123;</span><br><span class="line">            slow = slow.next;</span><br><span class="line">            fast = fast.next.next;</span><br><span class="line">        &#125;</span><br><span class="line">        ListNode reverse = slow.next;</span><br><span class="line">        slow.next = <span class="keyword">null</span>;</span><br><span class="line">        <span class="comment">// 2.反转后半部分链表</span></span><br><span class="line">        ListNode pre = <span class="keyword">null</span>;</span><br><span class="line">        <span class="keyword">while</span>(reverse!=<span class="keyword">null</span>)&#123;</span><br><span class="line">            ListNode next = reverse.next;</span><br><span class="line">            reverse.next = pre;</span><br><span class="line">            pre = reverse;</span><br><span class="line">            reverse = next;</span><br><span class="line">        &#125;</span><br><span class="line">       </span><br><span class="line">       <span class="comment">// 3.合并2个链表</span></span><br><span class="line">        ListNode cur = head;</span><br><span class="line">        ListNode start1 = head.next;</span><br><span class="line">        ListNode start2 = pre;</span><br><span class="line">        <span class="keyword">while</span>(start1 != <span class="keyword">null</span> &amp;&amp; start2 != <span class="keyword">null</span>)&#123;</span><br><span class="line">            cur.next = start2;</span><br><span class="line">            cur = cur.next;</span><br><span class="line">            start2 = start2.next;</span><br><span class="line"></span><br><span class="line">            cur.next = start1;            </span><br><span class="line">            cur = cur.next;</span><br><span class="line">            start1 = start1.next;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span>(start2 != <span class="keyword">null</span>)&#123;</span><br><span class="line">            cur.next = start2;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br></pre></td></tr></table></figure>
