ss="line">    componentDidUpdate()&#123;</span><br><span class="line">        console.log(&quot;02 组件更新完成&quot;)</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    componentWillReceiveProps()&#123;</span><br><span class="line">        console.log(&quot;父组件发生改变&quot;)</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    componentWillUnmount()&#123;</span><br><span class="line"></span><br><span class="line">        console.log(&quot;组件将要销毁&quot;)</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    render() &#123;</span><br><span class="line">        console.log(&quot;03 数据渲染&quot;)</span><br><span class="line"></span><br><span class="line">        return (</span><br><span class="line">            &lt;div&gt;</span><br><span class="line">                &lt;h2&gt;Lifecycle&lt;&#x2F;h2&gt;</span><br><span class="line">                &lt;hr &#x2F;&gt;</span><br><span class="line">                &lt;button onClick&#x3D;&#123;this.getData&#125;&gt;获取api数据&lt;&#x2F;button&gt;</span><br><span class="line">                &lt;hr &#x2F;&gt;</span><br><span class="line">                &lt;ul&gt;</span><br><span class="line">                    &#123;</span><br><span class="line">                        this.state.list.map((value, key) &#x3D;&gt; &#123;</span><br><span class="line">                            return (&lt;li key&#x3D;&#123;key&#125;&gt;&#123;value.title&#125;&lt;&#x2F;li&gt;)</span><br><span class="line">                        &#125;)</span><br><span class="line">                    &#125;</span><br><span class="line">                &lt;&#x2F;ul&gt;</span><br><span class="line">            &lt;&#x2F;div&gt;)</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">export default Lifecycle;</span><br><s
