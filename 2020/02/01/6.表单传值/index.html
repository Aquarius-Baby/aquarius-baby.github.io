ne">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br></pre></td><td class="code"><pre><span class="line">import React, &#123; Component &#125; from &#39;react&#39;;</span><br><span class="line"></span><br><span class="line">&#x2F;&#x2F; 数据绑定 事件</span><br><span class="line">class ReactForm extends Component &#123;</span><br><span class="line">    constructor(props) &#123;</span><br><span class="line">        super(props);</span><br><span class="line">        this.state &#x3D; &#123;</span><br><span class="line">            msg: &#39;reactForm&#39;,</span><br><span class="line">            name: &#39;&#39;,</span><br><span class="line">            sex: &#39;1&#39;,</span><br><span class="line">            city: &#39;江苏&#39;,</span><br><span class="line">            citys: [</span><br><span class="line">                &#39;北京&#39;, &#39;上海&#39;, &#39;江苏&#39;</span><br><span class="line">            ],</span><br><span class="line">            hobby: [</span><br><span class="line">                &#123;</span><br><span class="line">                    &#39;title&#39;: &#39;睡觉&#39;,</span><br><span class="line">                    &#39;checked&#39;: true</span><br><span class="line">                &#125;,</span><br><span class="line">                &#123;</span><br><span class="line">                    &#39;title&#39;: &#39;吃饭&#39;,</span><br><span class="line">                    &#39;checked&#39;: false</span><br><span class="line">                &#125;,</span><br><span class="line">                &#123;</span><br><span class="line">                    &#39;title&#39;: &#39;敲代码&#39;,</span><br><span class="line">                    &#39;checked&#39;: true</span><br><span class="line">                &#125;</span><br><span class="line">            ],</span><br><span class="line">            &#39;info&#39;: &#39;&#39;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    handleSubmit &#x3D; (e) &#x3D;&gt; &#123;</span><br><span class="line">        e.preventDefault()</span><br><span class="line">        console.log(this.state.name, this.state.sex, this.state.city, this.state.hobby, this.state.info)</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    handleName &#x3D; (e) &#x3D;&gt; &#123;</span><br><span class="line"></span><br><span class="line">        this.setState(&#123;</span><br><span class="line">            name: e.target.value</span><br><span class="line">        &#125;)</span><br><span class="line">    &#125;</span><br><span class="line">    handleSex &#x3D; (e) &#x3D;&gt; &#123;</span><br><span class="line">        this.setState(&#123;</span><br><span class="line">            sex: e.target.value</span><br><span class="line">        &#125;)</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">    handleCity &#x3D; (e) &#x3D;&gt; &#123;</span><br><span class="line">        this.setState(&#123;</span><br><span class="line">            city: e.target.value</span><br><span class="line">        &#125;)</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    handleHobby &#x3D; (key) &#x3D;&gt; &#123;</span><br><span class="line">        var hobby &#x3D; this.state.hobby;</span><br><span class="line">        hobby[key].checked &#x3D; !hobby[key].checked;</span><br><span class="line">        this.setState(&#123;</span><br><span class="line">            hobby: hobby</span><br><span class="line">        &#125;)</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    handleInfo &#x3D; (e) &#x3D;&gt; &#123;</span><br><span class="line">        this.setState(&#123;</span><br><span class="line">            info: e.target.value</span><br><span class="line">        &#125;)</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    render() &#123;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        return (&lt;div&gt;</span><br><span class="line"></span><br><span class="line">            &#123;this.state.msg&#125;</span><br><span class="line">            &lt;hr &#x2F;&gt;</span><br><span class="line">            &lt;form onSubmit&#x3D;&#123;this.handleSubmit&#125;&gt;</span><br><span class="line"></span><br><span class="line">                用户名：&lt;input type&#x3D;&#39;text&#39; value&#x3D;&#123;this.state.name&#125; onChange&#x3D;&#123;this.handleName&#125;&gt;&lt;&#x2F;input&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line"></span><br><span class="line">                sex： &lt;input type&#x3D;&#39;radio&#39; value&#x3D;&#39;1&#39; checked&#x3D;&#123;this.state.sex &#x3D;&#x3D; 1&#125; onChange&#x3D;&#123;this.handleSex&#125;&gt;&lt;&#x2F;input&gt;男</span><br><span class="line">                 &lt;input type&#x3D;&#39;radio&#39; value&#x3D;&#39;2&#39; checked&#x3D;&#123;this.state.sex &#x3D;&#x3D; 2&#125; onChange&#x3D;&#123;this.handleSex&#125;&gt;&lt;&#x2F;input&gt;女</span><br><span class="line">                 &lt;br &#x2F;&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line"></span><br><span class="line">                居住城市：</span><br><span class="line">                 &lt;select value&#x3D;&#123;this.state.city&#125; onChange&#x3D;&#123;this.handleCity&#125;&gt;</span><br><span class="line">                    &#123;</span><br><span class="line">                        this.state.citys.map(function (value, key) &#123;</span><br><span class="line">                            return &lt;option key&#x3D;&#123;key&#125;&gt;&#123;value&#125;&lt;&#x2F;option&gt;</span><br><span class="line">                        &#125;)</span><br><span class="line">                    &#125;</span><br><span class="line">                &lt;&#x2F;select&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line"></span><br><span class="line">                爱好：</span><br><span class="line">                 &#123;</span><br><span class="line">                    &#x2F;&#x2F;  注意this的指向</span><br><span class="line">                    this.state.hobby.map((value, key) &#x3D;&gt; &#123;</span><br><span class="line">                        return (</span><br><span class="line">                            &lt;span key&#x3D;&#123;key&#125;&gt;</span><br><span class="line">                                &lt;input type&#x3D;&#39;checkbox&#39; checked&#x3D;&#123;value.checked&#125; onChange&#x3D;&#123;this.handleHobby.bind(this, key)&#125; &#x2F;&gt; &#123;value.title&#125;</span><br><span class="line">                            &lt;&#x2F;span&gt;</span><br><span class="line">                        )</span><br><span class="line">                    &#125;)</span><br><span class="line">                &#125;</span><br><span class="line"></span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">                备注：</span><br><span class="line">                &lt;textarea value &#x3D; &#123;this.state.info&#125; onChange&#x3D;&#123;this.handleInfo&#125;&#x2F;&gt; </span><br><span class="line"></span><br><span class="line"></span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">                &lt;input type&#x3D;&#39;submit&#39; defaultValue&#x3D;&quot;提交&quot;&gt;&lt;&#x2F;input&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">                &lt;br &#x2F;&gt;</span><br><span class="line">            &lt;&#x2F;form&gt;</span><br><span class="line">        &lt;&#x2F;div&gt;)</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">export default ReactForm;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
